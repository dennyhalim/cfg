<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waiting…</title>
  <style>
    :root {
      --bg:      #0d0d12;
      --surface: #13131a;
      --border:  #1f1f2e;
      --accent:  #00ffc8;
      --warn:    #ff5f5f;
      --text:    #e4e4f0;
      --muted:   #50506a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,200,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,.025) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 44px 48px;
      width: min(460px, 94vw);
      box-shadow: 0 0 60px rgba(0,0,0,.6);
    }
    .card::after {
      content: '';
      position: absolute;
      top: -1px; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 28px;
    }

    .target {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
      word-break: break-all;
    }
    .target span { color: var(--text); }

    .st-row { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }

    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .dot.checking { background: var(--accent); box-shadow: 0 0 7px var(--accent);
                    animation: blink 1.1s ease-in-out infinite; }
    .dot.offline  { background: var(--warn);  box-shadow: 0 0 7px var(--warn); }
    .dot.online   { background: var(--accent); box-shadow: 0 0 12px var(--accent); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    .st-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
    }
    .st-label.checking { color: var(--accent); }
    .st-label.offline  { color: var(--warn); }
    .st-label.online   { color: var(--accent); }

    .st-next  { margin-top: 8px; font-size: 11px; color: var(--muted); }
    .st-next span { color: var(--accent); font-weight: 700; }
    .st-count { margin-top: 4px; font-size: 10px; color: var(--muted); letter-spacing: .04em; }

    .prog-wrap { margin-top: 12px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .prog-bar  { height: 100%; background: var(--accent); width: 0%; }
  </style>
</head>
<body id="denny.wordpress.com">
<div class="card">
  <p class="eyebrow">// redirect utility</p>
  <h1>Waiting for<br>your site</h1>
  <p class="target">Watching <span id="targetDisplay"></span></p>

  <div class="st-row">
    <div class="dot" id="dot"></div>
    <span class="st-label" id="stLabel"></span>
  </div>
  <div class="st-next"  id="stNext"></div>
  <div class="st-count" id="stCount"></div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
</div>

<script>
  // ─────────────────────────────────────────────
  //  CONFIGURATION — edit these two lines
  // ─────────────────────────────────────────────
  const TARGET_URL = 'https://denny.wordpress.com/';
  const INTERVAL   = 5; // seconds
  // ─────────────────────────────────────────────

  const dot     = document.getElementById('dot');
  const stLabel = document.getElementById('stLabel');
  const stNext  = document.getElementById('stNext');
  const stCount = document.getElementById('stCount');
  const progBar = document.getElementById('progBar');

  document.getElementById('targetDisplay').textContent = TARGET_URL;
  document.title = 'Waiting for ' + TARGET_URL;

  let attempts = 0;
  let tickId   = null;

  async function check() {
    attempts++;
    setState('checking', 'Checking…');
    stCount.textContent = `attempt #${attempts}`;

    const up = await ping(TARGET_URL);

    if (up) {
      setState('online', 'Online — redirecting');
      stNext.textContent  = '';
      stCount.textContent = `found after ${attempts} attempt${attempts > 1 ? 's' : ''}`;
      progBar.style.transition = 'width .4s ease';
      progBar.style.width = '100%';
      setTimeout(() => { window.location.href = TARGET_URL; }, 1000);
    } else {
      setState('offline', 'Offline');
      countdown(INTERVAL);
    }
  }

  function countdown(sec) {
    const step  = 80;
    const total = sec * 1000;
    let elapsed = 0;

    progBar.style.transition = 'none';
    progBar.style.width = '0%';

    function tick() {
      elapsed += step;
      const pct = Math.min((elapsed / total) * 100, 100);
      progBar.style.transition = `width ${step}ms linear`;
      progBar.style.width = pct + '%';
      const rem = Math.max(0, Math.ceil((total - elapsed) / 1000));
      stNext.innerHTML = `Next check in <span>${rem}s</span>`;
      if (elapsed >= total) check();
      else tickId = setTimeout(tick, step);
    }
    tickId = setTimeout(tick, step);
  }

  async function ping(url) {
    try {
      await fetch(url, {
        method: 'HEAD',
        mode: 'no-cors',
        cache: 'no-store',
        signal: AbortSignal.timeout(6000)
      });
      return true;
    } catch {
      return false;
    }
  }

  function setState(type, label) {
    dot.className       = 'dot ' + type;
    stLabel.className   = 'st-label ' + type;
    stLabel.textContent = label;
  }

  check();
</script>
</body>
</html>
denny.wordpress.com
